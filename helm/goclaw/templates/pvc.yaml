  {{- end }}
{{- end }}
---
{{- if .Values.tailscale.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "goclaw.fullname" . }}-tsnet-state
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: tailscale
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.tailscale.persistence.size }}
  {{- if .Values.tailscale.persistence.storageClass }}
  storageClassName: {{ .Values.tailscale.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
