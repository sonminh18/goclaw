{{- if and .Values.tailscale.enabled .Values.tailscale.authKey (not .Values.tailscale.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "goclaw.fullname" . }}-tailscale
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOCLAW_TSNET_AUTH_KEY: {{ .Values.tailscale.authKey | quote }}
{{- end }}
