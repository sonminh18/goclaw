{{- if and .Values.telemetry.enabled .Values.telemetry.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "goclaw.jaeger.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: tracing
spec:
  type: ClusterIP
  ports:
    - port: 16686
      targetPort: ui
      protocol: TCP
      name: ui
    - port: 4317
      targetPort: otlp-grpc
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      protocol: TCP
      name: otlp-http
  selector:
    app.kubernetes.io/name: {{ include "goclaw.name" . }}-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
