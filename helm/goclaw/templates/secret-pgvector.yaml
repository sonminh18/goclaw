{{- /*
  Managed Secret for pgvector subchart.
  The subchart's built-in Secret regenerates the password on every helm upgrade (no lookup),
  causing auth failures against the PVC-backed database.

  We create our own Secret with lookup-based password persistence.
  The subchart references this via existingSecret.enabled=true + existingSecret.name.
  Keys match the subchart: username, password, database.
*/}}
{{- if .Values.pgvector.enabled }}
{{- $secName := include "goclaw.pgvector.secretName" . }}
{{- $user := .Values.pgvector.postgresql.username | default "goclaw" }}
{{- $db := .Values.pgvector.postgresql.database | default "goclaw" }}

{{- /* Resolve password: existing secret (lookup) → random */}}
{{- $pass := "" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secName }}
{{- if $existing }}
  {{- $pass = index $existing.data "password" | b64dec }}
{{- else }}
  {{- $pass = randAlphaNum 32 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secName }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $user | quote }}
  password: {{ $pass | quote }}
  database: {{ $db | quote }}
{{- end }}
