{{- if .Values.ui.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "goclaw.ui.fullname" . }}-nginx
  labels:
    {{- include "goclaw.ui.labels" . | nindent 4 }}
data:
  default.conf: |
    # Included under http { } via conf.d — upstream must not be inside server { }.
    upstream goclaw_gateway {
        server {{ include "goclaw.fullname" . }}:{{ .Values.service.port }};
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 256;

        # Cache static assets
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # WebSocket proxy
        location /ws {
            proxy_pass http://goclaw_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # API proxy
        location /v1/ {
            proxy_pass http://goclaw_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check proxy
        location /health {
            proxy_pass http://goclaw_gateway;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
{{- end }}
