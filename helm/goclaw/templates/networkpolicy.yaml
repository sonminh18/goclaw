{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "goclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 18790
  egress:
    {{- /* Allow DNS */}}
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- /* Allow pgvector subchart pods */}}
    {{- if .Values.pgvector.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgvector
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    {{- if .Values.externalDatabase.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    {{- /* Allow Redis */}}
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    {{- /* Allow Chrome CDP */}}
    {{- if .Values.chrome.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "goclaw.chrome.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9222
    {{- end }}
    {{- /* Allow Jaeger/OTel */}}
    {{- if .Values.telemetry.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "goclaw.name" . }}-jaeger
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    {{- end }}
    {{- /* Allow outbound HTTPS for LLM APIs */}}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
