{{- if .Values.chrome.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "goclaw.chrome.fullname" . }}
  labels:
    {{- include "goclaw.chrome.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9222
      targetPort: cdp
      protocol: TCP
      name: cdp
  selector:
    {{- include "goclaw.chrome.selectorLabels" . | nindent 4 }}
{{- end }}
