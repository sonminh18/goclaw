{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- /* WebSocket and API routes go to gateway */}}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "goclaw.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- /* UI routes if enabled, otherwise gateway serves everything */}}
          {{- if $.Values.ui.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.ui.fullname" $ }}
                port:
                  number: {{ $.Values.ui.service.port }}
          {{- else }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "goclaw.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
