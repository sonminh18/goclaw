{{- /*
  External database: store user-supplied DSN in our own secret.
  pgvector DSN is assembled at runtime via env-var expansion — no secret needed here.
*/}}
{{- if and .Values.externalDatabase.enabled (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.dsn }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "goclaw.fullname" . }}-postgres
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOCLAW_POSTGRES_DSN: {{ .Values.externalDatabase.dsn | quote }}
{{- end }}
